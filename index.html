<!DOCTYPE html>
<html>
<head>
    <title>批次分析系統</title>
</head>
<body>

<h1>FHIR 批次分析</h1>

<button onclick="loadBatch()">批次抓取資料</button>

<pre id="output"></pre>

<script>
function loadBatch() {
    fetch('http://127.0.0.1:5000/batch-analysis')
        .then(res => res.json())
        .then(data => {
            document.getElementById("output").textContent =
                JSON.stringify(data, null, 2);
        });
}
</script>

</body>
</html>
